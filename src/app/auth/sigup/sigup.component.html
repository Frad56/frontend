<div class="page">

  <mat-card class="form-card">

    <!-- HEADER -->
    <div class="header">
      <h2>Sign Up</h2>
      <p>Create a new account</p>
    </div>

    <!-- FORM -->
    <form [formGroup]="userForm" (ngSubmit)="signup()" class="form">

      <div class="grid">

        <mat-form-field appearance="outline">
          <mat-label>Username</mat-label>
          <input matInput formControlName="username" />
          <mat-error *ngIf="userForm.get('username')?.hasError('required')">
            Username is required
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Password</mat-label>
          <input matInput 
                 [type]="hidePassword ? 'password' : 'text'" 
                 formControlName="password" />
          <mat-error *ngIf="userForm.get('password')?.hasError('required')">
            Password is required
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" />
          <mat-error *ngIf="userForm.get('email')?.hasError('required')">
            Email is required
          </mat-error> 
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Phone Number</mat-label>
          <input matInput formControlName="phoneNumber" />
          <mat-error *ngIf="userForm.get('phoneNumber')?.hasError('required')">
            phoneNumber is required
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Role</mat-label>
          <mat-select formControlName="role">
            <mat-option value="WORKER">WORKER</mat-option>
            <mat-option value="STOCK_KEEPER">STOCK_KEEPER</mat-option>
          </mat-select>  
        </mat-form-field>

      </div>

      <!-- BUTTONS -->
      <div class="button-group">

        <button mat-raised-button class="btn-blue" type="submit"
                [disabled]="userForm.invalid">
                Create Account
        </button>

        <button mat-stroked-button class="btn-outline" type="button" (click)="goBack()">
          Back
        </button>

      </div>

    </form>

  </mat-card>
</div>
