<body class="bg-primary">
    <div id="layoutAuthentication">
        <div id="layoutAuthentication_content">
            <main>
                <div class="container">
                    <div class="row justify-content-center">
                        <div class="col-lg-5">
                            <div class="card shadow-lg border-0 rounded-lg mt-5">
                                <div class="card-header"><h3 class="text-center font-weight-light my-4">Password Recovery</h3></div>
                                <div class="card-body">
                                    <div class="small mb-3 text-muted">Enter your email address and we will send you a code to reset your password.</div>
                                    <form [formGroup]="changePasswordForm">

                                        <!-- STEP 1 : Email -->
                                    <div *ngIf="step === 1">
                                        <div class="form-floating mb-3">
                                        <input class="form-control" formControlName="email" type="email" placeholder="name@example.com" />
                                        <label>Email address</label>
                                        </div>
                                        <div class="d-flex justify-content-between mt-4 mb-0">
                                        <button 
                                            class="btn btn-primary" 
                                            type="button" 
                                            (click)="verifyEmail()"
                                            [disabled]="loading">
                                    
                                            <span *ngIf="loading" class="spinner-border spinner-border-sm me-2" role="status"></span>
                                            {{ loading ? 'Sending...' : 'Send Reset Code' }}
                                    
                                        </button>
                                        </div>
                                    </div>
                                      
                                        <!-- STEP 2 : Code de vérification -->
                                        <div *ngIf="step === 2">
                                          <div class="form-floating mb-3">
                                            <input class="form-control" formControlName="code" type="text" placeholder="Enter code" />
                                            <label>Verification Code</label>
                                          </div>
                                          <button class="btn btn-primary" type="button" (click)="confirmCode()">
                                            Confirm Code
                                          </button>
                                        </div>
                                      
                                        <!-- STEP 3 : Nouveau mot de passe -->
                                        <div *ngIf="step === 3">
                                          <div class="form-floating mb-3">
                                            <input class="form-control" formControlName="newPassword" type="password" placeholder="New password" />
                                            <label>New Password</label>
                                          </div>
                                          <button class="btn btn-primary" type="button" (click)="resetPassword()">
                                            Confirm Change
                                          </button>
                                        </div>
                                      
                                        <div class="d-flex mt-4 mb-0">
                                          <a class="small" routerLink="/login">Return to login</a>
                                        </div>
                                      
                                      </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
        <div id="layoutAuthentication_footer">
            <footer class="py-4 bg-light mt-auto">
              <div class="container-fluid px-4">
                <div class="d-flex align-items-center justify-content-between small">
                  <div class="text-muted d-flex align-items-center gap-2">
                    <img src="assets/logo.png" alt="logo" style="width: 180px;">     
                  </div>
                </div>
              </div>
            </footer>
          </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="js/scripts.js"></script>
</body>
