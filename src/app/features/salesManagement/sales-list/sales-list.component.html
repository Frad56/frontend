<mat-card class="supplier-card">

    <mat-card-title>Sales List</mat-card-title>
  
    <div class="Add-button">
      <button mat-raised-button color="primary" (click)="addSale()">
        Add Sale Order
      </button>
      <button mat-raised-button color="primary" (click)="goBack()">
        Back
      </button>
    </div>
    <table mat-table [dataSource]="(saleOrdersList$ | async) || []" class="mat-elevation-z8">

 
      <ng-container matColumnDef="salesOrderDate">
        <th mat-header-cell *matHeaderCellDef> sales Order Date </th>
        
        <td mat-cell *matCellDef="let salesOrder">   {{ salesOrder.salesOrderDate | date:'dd/MM/yyyy HH:mm' }}</td>
      </ng-container>

      <ng-container matColumnDef="totalAmount">
        <th mat-header-cell *matHeaderCellDef> total Amount </th>
        <td mat-cell *matCellDef="let salesOrder"> {{salesOrder.totalAmount}} </td>
      </ng-container>



      <ng-container matColumnDef="clientName">
        <th mat-header-cell *matHeaderCellDef> Client</th>
        <td mat-cell *matCellDef="let salesOrder"> 
          <span *ngIf="!salesOrder?.clientId" class="anonymous">
            Anonymous
          </span>
          <span *ngIf="salesOrder?.clientId">
            {{ salesOrder.clientFirstName }} - {{ salesOrder.clientLastName }}
          </span>
        </td>
      </ng-container>
      
  
      <!-- Actions -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Actions </th>
        <td mat-cell *matCellDef="let salesOrder">
          
          <!-- Edit -->
          <button mat-icon-button matTooltip="Edit" class="btn-edit" (click)="editSaleOrder(salesOrder?.salesOrderId)">
            <img src="https://cdn-icons-png.flaticon.com/512/764/764599.png" alt="edit" width="20" height="20">
          </button>
      
          <!-- Delete -->
          <button mat-icon-button matTooltip="Delete" class="btn-delete" (click)="deleteSaleOrder(salesOrder?.salesOrderId)">
            <img src="https://cdn-icons-png.flaticon.com/512/3096/3096673.png" alt="delete" width="20" height="20">
          </button>
      
        </td>
      </ng-container>
  
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  
    </table>
  
  </mat-card>
