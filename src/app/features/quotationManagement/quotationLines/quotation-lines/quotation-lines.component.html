<div class="page">

    <mat-card class="form-card">
  
      <h2 class="title">Quotation List</h2>
  
      <div class="top-actions">
  
        <button mat-raised-button class="btn-blue" (click)="addQuotationLine()">
          Add Quotation
        </button>
  
        <button mat-stroked-button class="btn-outline" (click)="goBack()">
          Back
        </button>
  
      </div>
  
      <table mat-table [dataSource]="(quotationLines$ | async) || []"
             class="custom-table mat-elevation-z2">

  
        <!-- productVariantCode -->
        <ng-container matColumnDef="productVariantCode">
          <th mat-header-cell *matHeaderCellDef>Product Variant Code</th>
          <td mat-cell *matCellDef="let quotation">
            {{ quotation?.productVariantCode  }}
          </td>
        </ng-container>
         <!-- characteristicValue -->
        <ng-container matColumnDef="characteristicValue">
              <th mat-header-cell *matHeaderCellDef>Characteristics</th>
              <td mat-cell *matCellDef="let quotation">
                <span *ngFor="let entry of quotation?.characteristicValue | keyvalue">
                  <strong>{{ entry.key }}</strong>: {{ entry.value }}&nbsp;
                </span>
              </td>
          </ng-container>
         <!-- unitPrice -->
         <ng-container matColumnDef="unitPrice">
          <th mat-header-cell *matHeaderCellDef>unitPrice</th>
          <td mat-cell *matCellDef="let quotation">
            {{ quotation?.unitPrice }}
          </td>
        </ng-container>
        
          <!-- discount -->
          <ng-container matColumnDef="discount">
            <th mat-header-cell *matHeaderCellDef>discount</th>
            <td mat-cell *matCellDef="let quotation">
              {{ quotation?.discount }}
            </td>
          </ng-container>

            <!-- quotationLineTotal -->
            <ng-container matColumnDef="quotationLineTotal">
                <th mat-header-cell *matHeaderCellDef>quotationLineTotal</th>
                <td mat-cell *matCellDef="let quotation">
                {{ quotation?.quotationLineTotal }}
                </td>
            </ng-container>
          <!-- Actions -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let ql">
  
             <!-- Edit -->
          <button mat-icon-button matTooltip="Edit" class="btn-edit" (click)="editQuotationLine(ql.quotationLineId)">
            <img src="https://cdn-icons-png.flaticon.com/512/764/764599.png" alt="edit" width="20" height="20">
          </button>
      
          <!-- Delete -->
          <button mat-icon-button matTooltip="Delete" class="btn-delete" (click)="deleteQuotationLine(ql.quotationLineId)">
            <img src="https://cdn-icons-png.flaticon.com/512/3096/3096673.png" alt="delete" width="20" height="20">
          </button>
  
          </td>
        </ng-container>
  
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  
      </table>
  
    </mat-card>
  
  </div>
