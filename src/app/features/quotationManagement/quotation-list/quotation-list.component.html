<div class="page">

    <mat-card class="form-card">
  
      <h2 class="title">Quotation List</h2>
  
      <div class="top-actions">
  
        <button mat-raised-button class="btn-blue" (click)="addQuotation()">
          Add Quotation
        </button>
  
        <button mat-stroked-button class="btn-outline" (click)="goBack()">
          Back
        </button>
  
      </div>
  
      <table mat-table [dataSource]="(quotation$ | async) || []"
             class="custom-table mat-elevation-z2">


        <!-- quotationDate -->
        <ng-container matColumnDef="quotationDate">
          <th mat-header-cell *matHeaderCellDef>Date</th>
          <td mat-cell *matCellDef="let quotation">
            {{ quotation.quotationDate | date:'dd/MM/yyyy HH:mm' }}
          </td>
        </ng-container>
         <!-- totalAmount -->
         <ng-container matColumnDef="totalAmount">
          <th mat-header-cell *matHeaderCellDef>Total Amount</th>
          <td mat-cell *matCellDef="let quotation">
            {{ quotation.totalAmount }}
          </td>
        </ng-container>
         <!-- clientInfo -->
         <ng-container matColumnDef="clientInfo">
          <th mat-header-cell *matHeaderCellDef>Client</th>
          <td mat-cell *matCellDef="let quotation">
            {{ quotation?.clientFirstName }}-{{ quotation?.clientLastName }}
          </td>
        </ng-container>
        
          <!-- clientNumber -->
          <ng-container matColumnDef="clientNumber">
            <th mat-header-cell *matHeaderCellDef>client Number</th>
            <td mat-cell *matCellDef="let quotation">
              {{ quotation?.clientNumber }}
            </td>
          </ng-container>
        <!-- Actions -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let quotation">
  
             <!-- Edit -->
          <button mat-icon-button matTooltip="Edit" class="btn-edit" (click)="editQuotation( quotation.quotationId)">
            <img src="https://cdn-icons-png.flaticon.com/512/764/764599.png" alt="edit" width="20" height="20">
          </button>
      
          <!-- Delete -->
          <button mat-icon-button matTooltip="Delete" class="btn-delete" (click)="deleteQuotation( quotation.quotationId)">
            <img src="https://cdn-icons-png.flaticon.com/512/3096/3096673.png" alt="delete" width="20" height="20">
          </button>
  
          </td>
        </ng-container>
  
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  
      </table>
  
    </mat-card>
  
  </div>
