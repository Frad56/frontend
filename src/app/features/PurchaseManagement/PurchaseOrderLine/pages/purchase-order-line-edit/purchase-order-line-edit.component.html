<h2 class="title">Edit purchase Order Line</h2>

<div class="form-container" *ngIf="purchaseOrderLine">
  <form [formGroup]="purchaseOrderLineForm" (ngSubmit)="onSubmit()"  class="product-supplier-form">
  

    <div class="full-width">
      <label class="label">Company Name</label>
      <p class="value">
        {{ purchaseOrderLine.purchaseOrder.supplier.companyName }}
      </p>

    </div>


    <div class="full-width">
      <label class="label">Product Variant Code</label>
      <p class="value">
        {{ purchaseOrderLine.productVariant.code }}
      </p>
      <input 
      type="hidden" 
      formControlName="productVariantId"
      [value]="purchaseOrderLine.productVariant.productVariantId">
    </div>
  
  
    <mat-form-field appearance="outline" class="full-width">
        <mat-label>Unit</mat-label>
        <mat-select formControlName="productUnitPurchaseId">
          <mat-option *ngFor="let productUnitPurchase of unitList$ | async"
                      [value]="productUnitPurchase.productUnitPurchaseId" >
            {{ productUnitPurchase.unit.name }}
          </mat-option>
        </mat-select>
        <mat-error *ngIf="purchaseOrderLineForm.get('unitId')?.hasError('required')">
            unit is required
        </mat-error>
      </mat-form-field>

  
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>quantity</mat-label>
      <input matInput type="text" formControlName="quantity" placeholder="quantity">
    </mat-form-field>

 
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>discount</mat-label>
      <input matInput type="number" formControlName="discount" placeholder="basePrice">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
        <mat-label>unit Price TTC</mat-label>
        <input matInput type="number" formControlName="unitPriceTTC" placeholder="basePrice">
      </mat-form-field>


      <mat-form-field appearance="outline" class="full-width">
        <mat-label>tax</mat-label>
        <input matInput type="number" formControlName="tax" placeholder="tax">
      </mat-form-field>

    

    <div class="button-group">
      <button mat-raised-button class="Create-button" color="primary"  type="submit">
        Update
      </button>

      <button type="button"
              class="back-button"
              mat-raised-button
              color="primary"
              (click)="goBack()">
        Back
      </button>
    </div>

  </form>
</div>
