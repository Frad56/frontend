

<div class="header">
  <mat-card-title>Product Variant List</mat-card-title>

  <button mat-raised-button color="primary" (click)="goBack()">
    Back
  </button>
  
</div>
<mat-checkbox accent
  [checked]="isAllSelected()"
  [indeterminate]="isIndeterminate()"
  (change)="toggleAll($event.checked)">
  Select All
</mat-checkbox>
<table mat-table [dataSource]="(productVariants$ | async) || []" class="mat-elevation-z8">
  
      <ng-container matColumnDef="productVariantId">
          <th mat-header-cell *matHeaderCellDef> ID </th>
          <td mat-cell *matCellDef="let productVariant"> {{productVariant.productVariantId}} </td>
      </ng-container>
    
      <ng-container matColumnDef="code">
          <th mat-header-cell *matHeaderCellDef> code </th>
          <td mat-cell *matCellDef="let productVariant"> {{productVariant.code}} </td>
      </ng-container>
    
  
      <ng-container matColumnDef="specificPrice">
          <th mat-header-cell *matHeaderCellDef> specificPrice </th>
          <td mat-cell *matCellDef="let productVariant"> {{productVariant.specificPrice}} </td>
      </ng-container>
    
      <ng-container matColumnDef="quantityInStock">
          <th mat-header-cell *matHeaderCellDef> quantityInStock </th>
          <td mat-cell *matCellDef="let productVariant"> {{productVariant.quantityInStock}} </td>
      </ng-container>
  
      <ng-container matColumnDef="productId">
          <th mat-header-cell *matHeaderCellDef> Product  </th>
          <td mat-cell *matCellDef="let productVariant"> {{productVariant.product.reference}} </td>
      </ng-container>
      
      <ng-container matColumnDef="select">
        <th mat-header-cell *matHeaderCellDef> Select </th>
        <td mat-cell *matCellDef="let element; let i = index">
          <mat-checkbox
            [checked]="selection[i] "
            (change)="toggle(i,element)">
          </mat-checkbox>
        </td>
      </ng-container>
    
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    
      </table>
      <button mat-raised-button color="primary" (click)="saveSelection()">
        Save Selected
        
      </button>
