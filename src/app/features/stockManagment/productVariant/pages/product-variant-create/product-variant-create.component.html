<div class="page">

  <mat-card class="form-card">

    <h2 class="title">Create Article</h2>

    <!-- Product badge -->
    <div *ngIf="product" class="product-badge">
      <span class="badge-label">Product</span>
      <span class="badge-value">{{ product.reference }}</span>
    </div>

    <form [formGroup]="productVariantForm"
          (ngSubmit)="onSubmit()"
          class="form">

      <!-- Inputs -->
      <div class="form-grid">

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Specific Price</mat-label>
          <input matInput type="number" formControlName="specificPrice">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Stock</mat-label>
          <input matInput type="number" formControlName="quantityInStock">
        </mat-form-field>

      </div>

      <!-- Characteristics -->
      <div class="char-section" formArrayName="values" *ngIf="values.length > 0">

        <h3 class="sub-title">Characteristics</h3>

        <table mat-table
               [dataSource]="(characteristics$ | async) || []"
               class="custom-table mat-elevation-z1">

          <!-- Characteristic -->
          <ng-container matColumnDef="characteristic">
            <th mat-header-cell *matHeaderCellDef>Characteristic</th>
            <td mat-cell *matCellDef="let c">
              {{ c.characteristic.name }}
            </td>
          </ng-container>

          <!-- Value -->
          <ng-container matColumnDef="value">
            <th mat-header-cell *matHeaderCellDef>Value</th>
            <td mat-cell *matCellDef="let c; let i = index">

              <div [formGroupName]="i">
                <mat-form-field appearance="outline" class="table-input">
                  <input matInput formControlName="value" placeholder="Enter value">
                </mat-form-field>
              </div>

            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

        </table>

      </div>

      <!-- Buttons -->
      <div class="button-group">

        <button mat-raised-button class="btn-blue" type="submit">
          Create
        </button>

        <button mat-stroked-button class="btn-outline"
                type="button"
                (click)="goBack()">
          Back
        </button>

      </div>

    </form>

  </mat-card>

</div>
