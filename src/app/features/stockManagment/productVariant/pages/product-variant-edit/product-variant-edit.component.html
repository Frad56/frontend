<div class="page">

  <mat-card class="form-card">

    <h2 class="title">Edit Product Article</h2>

    <form [formGroup]="productVariantForm"
          (ngSubmit)="onSubmit()"
          class="form">

      <!-- Code -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Code</mat-label>
        <input matInput formControlName="code">
      </mat-form-field>

      <!-- Specific Price -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Specific Price</mat-label>
        <input matInput type="number" formControlName="specificPrice">
      </mat-form-field>

      <!-- Stock -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Quantity In Stock</mat-label>
        <input matInput type="number" formControlName="quantityInStock">
      </mat-form-field>

      <!-- Characteristics -->
      <div formGroupName="characteristic" class="char-section">

        <h3 class="sub-title">Characteristics</h3>

        <div *ngFor="let c of productVariantForm.get('characteristic')?.value | keyvalue">

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>{{ c.key }}</mat-label>
            <input matInput [formControlName]="c.key">
          </mat-form-field>

        </div>

      </div>

      <!-- Product -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Product Reference</mat-label>
        <mat-select formControlName="productId">
          <mat-option *ngFor="let product of products$ | async"
                      [value]="product.productId">
            {{ product.reference }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <!-- Buttons -->
      <div class="button-group">

        <button mat-raised-button class="btn-blue" type="submit">
          Update
        </button>

        <button mat-stroked-button class="btn-outline"
                type="button"
                (click)="goBack()">
          Back
        </button>

      </div>

    </form>

  </mat-card>

</div>
