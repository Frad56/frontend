
<mat-card class="product-card">

    <mat-card-title>Product Characteristic List</mat-card-title>

    <div class="Add-button">
    <button mat-raised-button color="primary" (click)="addProductCharacteristic()">
        Add 
    </button>
    <button mat-raised-button color="primary" (click)="goBack()">
        Back
    </button>
    </div>
    <table mat-table [dataSource]="(productCharacteristic$ | async) || []" class="mat-elevation-z8">

    <ng-container matColumnDef="productCharacteristicId">
        <th mat-header-cell *matHeaderCellDef> ID </th>
        <td mat-cell *matCellDef="let productCharacteristic"> {{productCharacteristic.productCharacteristicId}} </td>
    </ng-container>

    <!-- Reference -->
    <ng-container matColumnDef="productReference">
        <th mat-header-cell *matHeaderCellDef> Product Reference </th>
        <td mat-cell *matCellDef="let productCharacteristic"> {{productCharacteristic.product.reference}} </td>
    </ng-container>


    <ng-container matColumnDef="productDesignation">
        <th mat-header-cell *matHeaderCellDef> Product Designation </th>
        <td mat-cell *matCellDef="let productCharacteristic"> {{productCharacteristic.product.designation}} </td>
    </ng-container>
  
 
    <ng-container matColumnDef="characteristicName">
        <th mat-header-cell *matHeaderCellDef> Characteristic Name  </th>
        <td mat-cell *matCellDef="let productCharacteristic"> {{productCharacteristic.characteristic.name}} </td>
    </ng-container>
  
  
      <!-- Actions -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Actions </th>
        <td mat-cell *matCellDef="let productCharacteristic">
          
          <!-- Edit -->
          <button mat-icon-button matTooltip="Edit" class="btn-edit" (click)="editProductCharacteristic(productCharacteristic.productCharacteristicId)">
            <img src="https://cdn-icons-png.flaticon.com/512/764/764599.png" alt="edit" width="20" height="20">
          </button>
      
          <!-- Delete -->
          <button mat-icon-button matTooltip="Delete" class="btn-delete" (click)="deleteProductCharacteristic(productCharacteristic.productCharacteristicId)">
            <img src="https://cdn-icons-png.flaticon.com/512/3096/3096673.png" alt="delete" width="20" height="20">
          </button>
      
        </td>
      </ng-container>
  
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  
    </table>
  
  </mat-card>
