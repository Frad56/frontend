
<h2 class="title"> edit characteristic  </h2>

<div class="form-container">
  <form [formGroup]="characteristicForm" (ngSubmit)="onSubmit()" class="product-supplier-form">


    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Name</mat-label>
      <input matInput type="text" formControlName="name" placeholder="characteristicTypeValue">
    </mat-form-field>

    <mat-form-field>
        <mat-label>characteristic Type Value</mat-label>
        <mat-select formControlName="type">
          <mat-option *ngFor="let characteristicTypeValue of characteristicTypeValues"
          [value]="characteristicTypeValue">    {{ characteristicTypeValue }}</mat-option>
        </mat-select>
      </mat-form-field>

    <div class="button-group">
      <button mat-raised-button class="Create-button" color="primary" type="submit">
        Update
      </button>

      <button type="button"
              class="back-button"
              mat-raised-button
              color="primary"
              (click)="goBack()">
        Back
      </button>
    </div>

  </form>
</div>
