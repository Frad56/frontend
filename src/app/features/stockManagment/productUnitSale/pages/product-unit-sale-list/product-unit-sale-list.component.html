<div class="page">

    <mat-card class="form-card">
  
      <h2 class="title">Product Unit Sale List</h2> 
    
      <div class="top-actions">
  
        <button mat-raised-button class="btn-blue" (click)="addProductUnitSale()">
          Add
        </button>
  
        <button mat-stroked-button class="btn-outline" (click)="goBack()">
          Back
        </button>
  
      </div>
  
      <table mat-table [dataSource]="(productUnitSales$ | async) || []"
             class="variant-table mat-elevation-z2">

        <!-- Product Reference -->
        <ng-container matColumnDef="productReference">
          <th mat-header-cell *matHeaderCellDef>Product</th>
          <td mat-cell *matCellDef="let item">
            {{ item.productVariant.product?.reference }}
          </td>
        </ng-container>
  
        <!-- Description -->
        <ng-container matColumnDef="productDescription">
          <th mat-header-cell *matHeaderCellDef>Description</th>
          <td mat-cell *matCellDef="let item">
            {{ item.productVariant.product?.description  }}
          </td>
        </ng-container>
  
        <!-- Unit -->
        <ng-container matColumnDef="unit">
          <th mat-header-cell *matHeaderCellDef>Unit</th>
          <td mat-cell *matCellDef="let item">
            {{ item.unit?.symbol }}
          </td>
        </ng-container>
  
        <!-- Unit Price -->
        <ng-container matColumnDef="unitPrice">
          <th mat-header-cell *matHeaderCellDef>Unit Price</th>
          <td mat-cell *matCellDef="let item">
            {{ item.unitPrice }}
          </td>
        </ng-container>
  
        <!-- Conversion Factor -->
        <ng-container matColumnDef="conversionFactor">
          <th mat-header-cell *matHeaderCellDef>Conversion</th>
          <td mat-cell *matCellDef="let item">
            {{ item.conversionFactor }}
          </td>
        </ng-container>
  
        <!-- Actions -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let productUnitSale">
  
              <!-- Edit -->
          <button mat-icon-button matTooltip="Edit" class="btn-edit" (click)="editProductUnitSale(productUnitSale.productUnitSaleId)">
            <img src="https://cdn-icons-png.flaticon.com/512/764/764599.png" alt="edit" width="20" height="20">
          </button>
      
          <!-- Delete -->
          <button mat-icon-button matTooltip="Delete" class="btn-delete" (click)="deleteProductUnitSale(productUnitSale.productUnitSaleId)">
            <img src="https://cdn-icons-png.flaticon.com/512/3096/3096673.png" alt="delete" width="20" height="20">
          </button>
  
          </td>
        </ng-container>
  
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  
      </table>
  
    </mat-card>
  
  </div>
