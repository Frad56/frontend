<div class="page">

    <mat-card class="form-card">
  
      <h2 class="title">Aisle List</h2>
  
      <div class="top-actions">
  
        <button mat-raised-button class="btn-blue" (click)="addAisle()">
          Add Aisle
        </button>
  
        <button mat-stroked-button class="btn-outline" (click)="goBack()">
          Back
        </button>
  
      </div>
  
      <table mat-table [dataSource]="(aisles$ | async) || []"
             class="custom-table mat-elevation-z2">

  
        <!-- Name -->
        <ng-container matColumnDef="aisleName">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let aisle">
            {{ aisle.name }}
          </td>
        </ng-container>
  
        <!-- Actions -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let aisle">
  
             <!-- Edit -->
          <button mat-icon-button matTooltip="Edit" class="btn-edit" (click)="editAisle(aisle.aisleId)">
            <img src="https://cdn-icons-png.flaticon.com/512/764/764599.png" alt="edit" width="20" height="20">
          </button>
      
          <!-- Delete -->
          <button mat-icon-button matTooltip="Delete" class="btn-delete" (click)="deleteAisle(aisle.aisleId)">
            <img src="https://cdn-icons-png.flaticon.com/512/3096/3096673.png" alt="delete" width="20" height="20">
          </button>
  
          </td>
        </ng-container>
  
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  
      </table>
  
    </mat-card>
  
  </div>
