<mat-card class="product-card">

    <mat-card-title>Characteristic Value List</mat-card-title>
  
   
    <div class="Add-button">
      
      <button mat-raised-button color="primary" (click)="addCharacteristicValue()">
        Add 
      </button>
      <button mat-raised-button color="primary" (click)="goBack()">
        Back
      </button>
    </div>
    <table mat-table [dataSource]="(characteristicValueList$ | async) || []" class="mat-elevation-z8">
  
      <!-- ID -->
      <ng-container matColumnDef="characteristicValueId">
        <th mat-header-cell *matHeaderCellDef> ID </th>
        <td mat-cell *matCellDef="let characteristicValue"> {{characteristicValue.characteristicValueId}} </td>
      </ng-container>
  

      <ng-container matColumnDef="productReference">
        <th mat-header-cell *matHeaderCellDef> Product Reference </th>
        <td mat-cell *matCellDef="let characteristicValue"> {{characteristicValue.productCharacteristic.product.reference}} </td>
      </ng-container>
  

      <ng-container matColumnDef="productVariantCode">
        <th mat-header-cell *matHeaderCellDef> Designation </th>
        <td mat-cell *matCellDef="let characteristicValue"> {{characteristicValue.productVariant.code}}</td>
      </ng-container>
  

      <ng-container matColumnDef="value">
        <th mat-header-cell *matHeaderCellDef> Value </th>
        <td mat-cell *matCellDef="let characteristicValue"> {{characteristicValue.value}} </td>
      </ng-container>
      
      
  
      <!-- Actions -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Actions </th>
        <td mat-cell *matCellDef="let characteristicValue">
         
          <!-- Edit -->
          <button mat-icon-button matTooltip="Edit" class="btn-edit" (click)="editCharacteristicValue(characteristicValue.characteristicValueId)">
            <img src="https://cdn-icons-png.flaticon.com/512/764/764599.png" alt="edit" width="20" height="20">
          </button>
      
          <!-- Delete -->
          <button mat-icon-button matTooltip="Delete" class="btn-delete" (click)="deleteCharacteristicValue(characteristicValue.characteristicValueId)">
            <img src="https://cdn-icons-png.flaticon.com/512/3096/3096673.png" alt="delete" width="20" height="20">
          </button>
      
        </td>
      </ng-container>
  
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  
    </table>
  
  </mat-card>
