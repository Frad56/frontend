<div class="page">

  <mat-card class="form-card">

    <h2 class="title">Edit Unit</h2>

    <form [formGroup]="unitForm"
          (ngSubmit)="onSubmit()"
          class="form">

      <!-- Unit Name -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Unit Name</mat-label>
        <input matInput formControlName="unitName"
               placeholder="Enter unit name">
      </mat-form-field>

      <!-- Unit Symbol -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Unit Symbol</mat-label>
        <input matInput formControlName="unitSymbol"
               placeholder="Enter unit symbol">
      </mat-form-field>

      <!-- Buttons -->
      <div class="button-group">

        <button mat-raised-button class="btn-blue" type="submit">
          Update
        </button>

        <button mat-stroked-button class="btn-outline"
                type="button"
                (click)="goBack()">
          Back
        </button>

      </div>

    </form>

  </mat-card>

</div>
