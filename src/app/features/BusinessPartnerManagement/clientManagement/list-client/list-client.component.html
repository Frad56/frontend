<mat-card class="supplier-card">

  <!-- HEADER -->
  <div class="header">

    <div>
      <h2>Client List</h2>
      <p>Manage all clients</p>
    </div>

    <div class="actions">

      <button mat-raised-button class="btn-blue" (click)="addClient()">
        Add Client
      </button>

      <button mat-stroked-button class="btn-outline" (click)="goBack()">
        Back
      </button>

    </div>

  </div>

  <!-- TABLE -->
  <table mat-table [dataSource]="(clients$ | async) || []"
         class="mat-elevation-z2 full-table">


    <ng-container matColumnDef="firstName">
      <th mat-header-cell *matHeaderCellDef>First Name</th>
      <td mat-cell *matCellDef="let client">{{client.firstName}}</td>
    </ng-container>

    <ng-container matColumnDef="lastName">
      <th mat-header-cell *matHeaderCellDef>Last Name</th>
      <td mat-cell *matCellDef="let client">{{client.lastName}}</td>
    </ng-container>

    <ng-container matColumnDef="phoneNumber">
      <th mat-header-cell *matHeaderCellDef>Phone</th>
      <td mat-cell *matCellDef="let client">{{client.phoneNumber}}</td>
    </ng-container>

    <ng-container matColumnDef="fax">
      <th mat-header-cell *matHeaderCellDef>Fax</th>
      <td mat-cell *matCellDef="let client">{{client.fax}}</td>
    </ng-container>

    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef>Email</th>
      <td mat-cell *matCellDef="let client">{{client.email}}</td>
    </ng-container>

    <ng-container matColumnDef="address">
      <th mat-header-cell *matHeaderCellDef>Address</th>
      <td mat-cell *matCellDef="let client">{{client.address}}</td>
    </ng-container>

    <ng-container matColumnDef="city">
      <th mat-header-cell *matHeaderCellDef>City</th>
      <td mat-cell *matCellDef="let client">{{client.city}}</td>
    </ng-container>

    <ng-container matColumnDef="postalCode">
      <th mat-header-cell *matHeaderCellDef>Postal Code</th>
      <td mat-cell *matCellDef="let client">{{client.postalCode}}</td>
    </ng-container>

    <ng-container matColumnDef="country">
      <th mat-header-cell *matHeaderCellDef>Country</th>
      <td mat-cell *matCellDef="let client">{{client.country}}</td>
    </ng-container>

    <!-- ACTIONS -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let client">

        <button mat-icon-button matTooltip="Edit" class="btn-edit"
                (click)="editClient(client.clientId)">
          <img src="https://cdn-icons-png.flaticon.com/512/764/764599.png"
               width="20" height="20">
        </button>

        <button mat-icon-button matTooltip="Delete" class="btn-delete"
                (click)="deleteClient(client.clientId)">
          <img src="https://cdn-icons-png.flaticon.com/512/3096/3096673.png"
               width="20" height="20">
        </button>

      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  </table>

</mat-card>
