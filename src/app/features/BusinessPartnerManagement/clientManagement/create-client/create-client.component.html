<div class="page">

  <mat-card class="form-card">

    <!-- HEADER -->
    <div class="header">
      <h2>Create Client</h2>
      <p>Fill in client information</p>
    </div>

    <!-- FORM -->
    <form [formGroup]="clientForm" (ngSubmit)="onSubmit()" class="form">

      <div class="grid">

        <mat-form-field appearance="outline">
          <mat-label>First Name</mat-label>
          <input matInput formControlName="firstName">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Last Name</mat-label>
          <input matInput formControlName="lastName">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Phone Number</mat-label>
          <input matInput formControlName="phoneNumber">
        </mat-form-field>
        
        <mat-form-field appearance="outline">
          <mat-label>Fax</mat-label>
          <input matInput formControlName="fax">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Address</mat-label>
          <input matInput formControlName="address">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>City</mat-label>
          <input matInput formControlName="city">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Postal Code</mat-label>
          <input matInput formControlName="postalCode">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Country</mat-label>
          <input matInput formControlName="country">
        </mat-form-field>

      </div>

      <!-- BUTTONS -->
      <div class="button-group">

        <button mat-raised-button class="btn-blue" type="submit">
          Create Client
        </button>

        <button mat-stroked-button class="btn-outline" type="button" (click)="goBack()">
          Back
        </button>

      </div>

    </form>

  </mat-card>
</div>
