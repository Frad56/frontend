<div class="page">

  <mat-card class="form-card">

    <div class="header">
      <h2>Update Supplier</h2>
      <p>Fill in supplier information</p>
    </div>

    <form [formGroup]="supplierForm" (ngSubmit)="onSubmit()" class="form">

      <div class="grid">

        <mat-form-field appearance="outline">
          <mat-label>Company Name</mat-label>
          <input matInput formControlName="companyName">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Contact Name</mat-label>
          <input matInput formControlName="contactName">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Phone Number</mat-label>
          <input matInput formControlName="phoneNumber">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Fax</mat-label>
          <input matInput formControlName="fax">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Address</mat-label>
          <input matInput formControlName="address">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>City</mat-label>
          <input matInput formControlName="city">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Postal Code</mat-label>
          <input matInput formControlName="postalCode">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Country</mat-label>
          <input matInput formControlName="country">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Tax Identification Number</mat-label>
          <input matInput formControlName="taxIdentificationNumber">
        </mat-form-field>

      </div>

      <!-- BUTTONS -->
      <div class="button-group">

        <button mat-raised-button class="btn-blue" type="submit">
          Update Supplier
        </button>

        <button mat-stroked-button class="btn-outline" type="button" (click)="goBack()">
          Back
        </button>

      </div>

    </form>

  </mat-card>
</div>
